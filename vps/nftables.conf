table ip nat {
    chain PREROUTING {
        type nat hook prerouting priority dstnat; policy accept;

        iifname "eth0" tcp dport 2222 dnat to 10.10.0.2:2222
        iifname "eth0" tcp dport 80 dnat to 10.10.0.1:80
        iifname "eth0" tcp dport 443 dnat to 10.10.0.1:443
        iifname "eth0" tcp dport 2223 dnat to 10.10.0.2:2223
        ip daddr 187.127.143.52 udp dport 8443 dnat to 10.10.0.2:8443
        ip daddr 187.127.143.52 tcp dport 8443 dnat to 10.10.0.2:8443
    }

    chain POSTROUTING {
        type nat hook postrouting priority srcnat; policy accept;

        oifname "wg0" masquerade
        ip daddr 10.10.0.2 oifname "wg0" udp dport 8443 masquerade
        ip daddr 10.10.0.2 oifname "wg0" tcp dport 8443 masquerade
    }
}

table ip filter {
    chain INPUT {
        type filter hook input priority filter; policy drop;

        ct state established,related accept
        iifname "lo" accept

        tcp dport 22 accept
        tcp dport { 80, 443 } accept
        tcp dport { 2222, 2223 } accept

        udp dport 33 accept
        udp dport 51820 accept
    }

    chain FORWARD {
        type filter hook forward priority filter; policy drop;

        ct state established,related accept

        iifname "eth0" oifname "wg0" accept
        iifname "wg0" oifname "eth0" accept
        iifname "wg0" oifname "wg0" accept
        ip daddr 10.10.0.2 udp dport 8443 accept
        ip daddr 10.10.0.2 tcp dport 8443 accept
    }
}
